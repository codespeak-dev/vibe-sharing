<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vibe Share — Uploads</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app" style="display: none;">
    <div class="header">
      <h1>Vibe Share</h1>
      <div class="header-actions">
        <button id="undo-btn" class="btn btn-undo" style="display: none;">Undo</button>
        <button id="upload-btn" class="btn">Upload</button>
        <a href="internal-emails.html" class="btn">Internal Emails</a>
        <button id="refresh-btn" class="btn">Refresh</button>
        <button id="logout-btn" class="btn">Logout</button>
      </div>
    </div>
    <div class="container">
      <div class="filter-bar">
        <label>
          <input type="checkbox" id="show-internal" />
          Show internal uploads
        </label>
      </div>
      <div id="loading">Loading uploads...</div>
      <div id="error" style="display: none;"></div>
      <div id="empty-state" style="display: none;">No uploads yet.</div>
      <table id="uploads-table">
        <thead>
          <tr>
            <th>Filename</th>
            <th>Size</th>
            <th>Uploaded by</th>
            <th>Repo</th>
            <th>Notes</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="uploads-body"></tbody>
      </table>

      <div id="slack-threads-section" style="display: none;">
        <h2>Slack Threads</h2>
        <table id="threads-table">
          <thead>
            <tr>
              <th>User / IP</th>
              <th>Channel</th>
              <th>Created</th>
              <th>Expires</th>
            </tr>
          </thead>
          <tbody id="threads-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="upload-modal" class="modal" style="display: none;">
    <div class="modal-content upload-modal-content">
      <div class="modal-header">
        <h3>Upload ZIP Archive</h3>
        <button id="upload-close" class="btn-close">&times;</button>
      </div>
      <div class="upload-form">
        <label>ZIP File <input type="file" id="upload-file" accept=".zip" /></label>
        <label>Email <input type="email" id="upload-email" placeholder="user@example.com" /></label>
        <label>Name <input type="text" id="upload-name" placeholder="User name" /></label>
        <label>Repo URL <input type="text" id="upload-repo" placeholder="https://github.com/..." /></label>
        <div class="upload-actions">
          <button id="upload-submit" class="btn-add" disabled>Upload</button>
          <button id="upload-cancel" class="btn-remove">Cancel</button>
        </div>
        <div id="upload-progress" style="display: none;"></div>
        <div id="upload-error" style="display: none;"></div>
      </div>
    </div>
  </div>

  <div id="file-tree-modal" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="file-tree-title">Files</h3>
        <button id="file-tree-close" class="btn-close">&times;</button>
      </div>
      <div id="file-tree-loading" style="display: none;">Loading file list...</div>
      <div id="file-tree-error" style="display: none;"></div>
      <div id="file-tree-content"></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
